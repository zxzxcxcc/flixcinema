<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixCinema | Home Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Urbanist:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Urbanist', 'sans-serif'] },
                    colors: { dark: '#08090b', card: '#0c0d10', border: '#1a1c23', accent: '#3b82f6' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #08090b; color: #f8fafc; overflow-x: hidden; }
        .glass-nav { background: rgba(8, 9, 11, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #1a1c23; }
        .movie-card:hover { transform: translateY(-8px); border-color: #3b82f6; }
        .movie-card img { transition: transform 0.5s ease; }
        .movie-card:hover img { transform: scale(1.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass-nav fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-20">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-accent rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                    <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>
                </div>
                <h1 class="text-2xl font-display font-extrabold tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">FlixCinema</h1>
            </div>
            
            <div class="relative group">
                <button class="flex items-center gap-2 text-gray-300 hover:text-white font-bold uppercase tracking-widest text-sm focus:outline-none py-4">
                    Menu <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div class="absolute right-0 top-full w-48 bg-card border border-border rounded-xl shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform origin-top-right scale-95 group-hover:scale-100">
                    <div class="p-2 flex flex-col gap-1">
                        <a href="index.html" class="px-4 py-2 text-accent bg-accent/10 rounded-lg font-bold">Home</a>
                        <a href="movies.html" class="px-4 py-2 text-gray-300 hover:text-white hover:bg-gray-800 rounded-lg transition font-medium">Movies</a>
                        <a href="series.html" class="px-4 py-2 text-gray-300 hover:text-white hover:bg-gray-800 rounded-lg transition font-medium">Series</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="mt-32 px-6 max-w-4xl mx-auto text-center">
        <h2 class="text-4xl md:text-5xl font-display font-extrabold mb-6">Latest <span class="text-accent">Fetches</span> Mixed</h2>
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000"></div>
            <div class="relative flex items-center">
                <input type="search" id="q" onkeyup="search()" placeholder="Search movies or series..." class="w-full bg-card border border-border rounded-2xl py-5 px-14 text-lg focus:outline-none focus:ring-2 focus:ring-accent transition shadow-2xl">
                <svg class="absolute left-5 w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 mt-16">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6" id="grid">
            <div class="col-span-full text-center text-gray-500 py-10" id="loading">Loading library...</div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-card w-full max-w-4xl max-h-[90vh] rounded-3xl border border-border overflow-hidden flex flex-col shadow-2xl scale-90 transition-transform duration-300" id="mContent">
            <div class="p-6 border-b border-border flex justify-between items-center bg-[#11141b]">
                <h2 id="mTitle" class="text-2xl font-display font-bold">Series</h2>
                <button onclick="closeModal()" class="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-red-600 transition">&times;</button>
            </div>
            <div id="mBody" class="p-6 overflow-y-auto flex-1 space-y-8 no-scrollbar"></div>
        </div>
    </div>

    <script>
    const API_URL = "https://toolsmax.site/api.php";
    const fallback_img = "https://i.quotev.com/b2gtjqawaaaa.jpg";
    let globalSeriesData = {};

    fetch(`${API_URL}?action=get_all`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loading').style.display = 'none';
            globalSeriesData = data.series || {};
            let html = '';
            
            let moviesArr = data.movies || [];
            let seriesArr = [];
            
            if (data.series) {
                for (const [name, sData] of Object.entries(data.series)) {
                    seriesArr.push({ name: name, ...sData });
                }
            }
            
            // Yahan humne series ko reverse kar diya hai (New to Old/Opposite)
            seriesArr.reverse();

            let combined = [];
            let maxLength = Math.max(moviesArr.length, seriesArr.length);
            
            for (let i = 0; i < maxLength; i++) {
                if (moviesArr[i]) combined.push({ type: 'movie', item: moviesArr[i] });
                if (seriesArr[i]) combined.push({ type: 'series', item: seriesArr[i] });
            }

            if (combined.length > 0) {
                combined.forEach(media => {
                    if (media.type === 'movie') {
                        const m = media.item;
                        const safeTitle = m.title ? m.title.replace(/'/g, "\\'") : 'Unknown';
                        html += `
                        <div class="item movie-card bg-card border border-border rounded-2xl overflow-hidden transition-all duration-300 relative group" data-title="${(m.title||'').toLowerCase()}">
                            <div class="absolute top-3 left-3 z-10 bg-accent/80 backdrop-blur px-2 py-1 rounded text-[10px] font-black uppercase tracking-tighter">Movie</div>
                            <div class="aspect-[2/3] overflow-hidden bg-gray-900">
                                <img src="${m.logo || fallback_img}" class="w-full h-full object-cover" onerror="this.src='${fallback_img}'">
                                <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                                    <button onclick="playMedia('${m.url}', '${safeTitle}')" class="bg-accent p-4 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.5)] transform scale-50 group-hover:scale-100 transition duration-300">
                                        <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="p-4"><h3 class="text-sm font-bold truncate text-white">${m.title || 'Unknown Movie'}</h3></div>
                        </div>`;
                    } else if (media.type === 'series') {
                        const s = media.item;
                        const name = s.name;
                        let seasonCount = s.seasons ? Object.keys(s.seasons).length : 0;
                        html += `
                        <div class="item movie-card bg-card border border-border rounded-2xl overflow-hidden transition-all duration-300 relative group cursor-pointer" onclick="openSeries('${name.replace(/'/g, "\\'")}')" data-title="${name.toLowerCase()}">
                            <div class="absolute top-3 left-3 z-10 bg-purple-600/80 backdrop-blur px-2 py-1 rounded text-[10px] font-black uppercase tracking-tighter">Series</div>
                            <div class="aspect-[2/3] overflow-hidden bg-gray-900">
                                <img src="${s.logo || fallback_img}" class="w-full h-full object-cover" onerror="this.src='${fallback_img}'">
                                <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">
                                    <div class="bg-purple-600 px-4 py-2 rounded-full text-xs font-black uppercase shadow-[0_0_15px_rgba(168,85,247,0.5)]">View Eps</div>
                                </div>
                            </div>
                            <div class="p-4"><h3 class="text-sm font-bold truncate text-white">${name}</h3><p class="text-[10px] text-purple-400 mt-1 uppercase font-bold">${seasonCount} Seasons</p></div>
                        </div>`;
                    }
                });
            }

            if (html === '') {
                html = '<div class="col-span-full text-center text-gray-500 py-10">No content found in library.</div>';
            }

            document.getElementById('grid').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('loading').innerText = "Failed to load data from server.";
            console.error("API Fetch Error: ", err);
        });

    function playMedia(u, t) {
        const isM = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if(isM) { window.location.href = `intent:${u}#Intent;type=video/*;end`; } 
        else {
            const blob = new Blob(["#EXTM3U\n#EXTINF:-1," + t + "\n" + u], {type: "audio/mpegurl"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = t + ".m3u";
            a.click();
        }
    }

    function openSeries(name) {
        const d = globalSeriesData[name];
        if(!d) return;
        document.getElementById('mTitle').innerText = name;
        let h = '';
        
        // Sorting Seasons New to Old (Descending)
        const sortedSeasonKeys = Object.keys(d.seasons).sort((a, b) => parseInt(b) - parseInt(a));

        sortedSeasonKeys.forEach(s => {
            const eps = d.seasons[s];
            // Sorting Episodes New to Old (Descending)
            let sortedEps = eps.sort((a, b) => parseInt(b.episode) - parseInt(a.episode));
            
            h += `<div class="bg-gray-900/50 p-6 rounded-2xl border border-border mb-6">
                    <h3 class="text-purple-500 font-black mb-4 uppercase tracking-widest text-sm">Season ${s}</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">`;
            
            sortedEps.forEach(e => {
                const safeTitle = e.title.replace(/'/g, "\\'");
                h += `<button onclick="playMedia('${e.url}', '${safeTitle}')" class="flex items-center gap-3 p-3 bg-card border border-border rounded-xl hover:border-purple-500 transition group text-left shadow-sm">
                        <div class="w-8 h-8 rounded bg-purple-600/10 flex items-center justify-center text-purple-500 group-hover:bg-purple-600 group-hover:text-white transition"><svg class="w-3 h-3 ml-0.5" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg></div>
                        <div class="overflow-hidden"><span class="block text-xs font-bold text-white">Episode ${e.episode}</span><span class="block text-[10px] text-gray-500 truncate w-32">${e.title}</span></div>
                      </button>`;
            });
            h += `</div></div>`;
        });
        
        document.getElementById('mBody').innerHTML = h;
        document.getElementById('modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('mContent').classList.replace('scale-90', 'scale-100'), 10);
    }

    function closeModal() {
        document.getElementById('mContent').classList.replace('scale-100', 'scale-90');
        setTimeout(() => document.getElementById('modal').classList.add('hidden'), 300);
    }

    function search() {
        let v = document.getElementById('q').value.toLowerCase();
        document.querySelectorAll('.item').forEach(i => {
            i.style.display = i.getAttribute('data-title').includes(v) ? 'block' : 'none';
        });
    }
    </script>
</body>
</html>
