<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixCinema - Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        .movie-card { background: #0a0a0a; border: 1px solid #222; transition: 0.3s; }
        .movie-card:hover { border-color: #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <h1 class="text-xl font-bold text-white tracking-wider">FLIX<span class="text-blue-500">CINEMA</span></h1>
            <div class="relative group">
                <button class="text-sm uppercase font-bold text-gray-400">Menu ▾</button>
                <div class="absolute right-0 top-full mt-2 w-32 bg-[#111] border border-[#222] rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                    <a href="https://zxzxcxcc.github.io/flixcinema/" class="block px-4 py-2 text-xs hover:bg-[#222]">Home</a>
                    <a href="https://zxzxcxcc.github.io/flixcinema/movies.html" class="block px-4 py-2 text-xs hover:bg-[#222]">Movies</a>
                    <a href="https://zxzxcxcc.github.io/flixcinema/series.html" class="block px-4 py-2 text-xs hover:bg-[#222]">Series</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="mt-28 px-6 max-w-7xl mx-auto">
        <input type="search" id="q" onkeyup="search()" placeholder="Search movies..." 
        class="w-full bg-[#0a0a0a] border border-[#222] rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 text-sm">
    </div>

    <div class="max-w-7xl mx-auto px-6 mt-8">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" id="grid">
            <div class="col-span-full text-center text-gray-600 py-10" id="loading">Loading movies...</div>
        </div>
    </div>

    <script>
    const API_URL = "https://toolsmax.site/flixphp/api.php";
    const fallback = "https://i.quotev.com/b2gtjqawaaaa.jpg";

    fetch(`${API_URL}?action=get_all`).then(res => res.json()).then(data => {
        document.getElementById('loading').style.display = 'none';
        
        let movies = data.movies || [];
        let html = '';
        
        for (let i = 0; i < movies.length; i++) {
            const m = movies[i];
            html += `<div class="movie-card rounded-lg overflow-hidden item relative" data-title="${(m.title||'').toLowerCase()}">
                <span class="absolute top-2 left-2 bg-blue-600/90 text-white px-2 py-1 text-[9px] font-bold rounded tracking-wider z-10">MOVIE</span>
                <img src="${m.logo || fallback}" class="w-full aspect-[2/3] object-cover">
                <div class="p-3">
                    <h3 class="text-xs font-bold truncate mb-3">${m.title}</h3>
                    <div class="flex flex-col gap-2">
                        <button onclick="playMedia('${m.url}', '${m.title.replace(/'/g, "\\'")}')" class="w-full bg-blue-600 py-1.5 rounded text-[10px] font-bold">▶ PLAY</button>
                        <a href="${m.url.replace('/api/file/', '/u/')}" target="_blank" class="w-full bg-[#222] py-1.5 rounded text-[10px] font-bold text-center uppercase tracking-wide">DOWNLOAD</a>
                    </div>
                </div>
            </div>`;
        }
        document.getElementById('grid').innerHTML = html;
    });

    function playMedia(u, t) {
        const isM = /Android|iPhone/i.test(navigator.userAgent);
        if(isM) window.location.href = `intent:${u}#Intent;type=video/*;end`;
        else {
            const b = new Blob(["#EXTM3U\n#EXTINF:-1," + t + "\n" + u], {type: "audio/mpegurl"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b); a.download = t + ".m3u"; a.click();
        }
    }

    function search() {
        let v = document.getElementById('q').value.toLowerCase();
        document.querySelectorAll('.item').forEach(i => i.style.display = i.getAttribute('data-title').includes(v) ? 'block' : 'none');
    }
    </script>
</body>
</html>
