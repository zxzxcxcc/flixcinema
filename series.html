<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlixCinema - Series</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: sans-serif; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #222; }
        .movie-card { background: #0a0a0a; border: 1px solid #222; transition: 0.3s; }
        .movie-card:hover { border-color: #3b82f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="glass fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">
            <h1 class="text-xl font-bold text-white tracking-wider">FLIX<span class="text-blue-500">CINEMA</span></h1>
            <div class="relative group">
                <button class="text-sm uppercase font-bold text-gray-400">Menu ▾</button>
                <div class="absolute right-0 top-full mt-2 w-32 bg-[#111] border border-[#222] rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                    <a href="https://zxzxcxcc.github.io/flixcinema/" class="block px-4 py-2 text-xs hover:bg-[#222]">Home</a>
                    <a href="https://zxzxcxcc.github.io/flixcinema/movies.html" class="block px-4 py-2 text-xs hover:bg-[#222]">Movies</a>
                    <a href="https://zxzxcxcc.github.io/flixcinema/series.html" class="block px-4 py-2 text-xs hover:bg-[#222]">Series</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="mt-28 px-6 max-w-7xl mx-auto">
        <input type="search" id="q" onkeyup="search()" placeholder="Search series..." 
        class="w-full bg-[#0a0a0a] border border-[#222] rounded-lg py-3 px-4 focus:outline-none focus:border-blue-500 text-sm">
    </div>

    <div class="max-w-7xl mx-auto px-6 mt-8">
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4" id="grid">
            <div class="col-span-full text-center text-gray-600 py-10" id="loading">Loading series...</div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] hidden bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-[#0a0a0a] w-full max-w-lg rounded-xl border border-[#222] shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-[#222] flex justify-between items-center">
                <h2 id="mTitle" class="text-sm font-bold text-white">Episodes</h2>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white">&times;</button>
            </div>
            <div id="mBody" class="p-4 max-h-[70vh] overflow-y-auto no-scrollbar space-y-2"></div>
        </div>
    </div>

    <script>
    const API_URL = "https://toolsmax.site/flixphp/api.php";
    const fallback = "https://i.quotev.com/b2gtjqawaaaa.jpg";
    let globalSeriesData = {};

    fetch(`${API_URL}?action=get_all`).then(res => res.json()).then(data => {
        document.getElementById('loading').style.display = 'none';
        globalSeriesData = data.series || {};
        
        let series = [];
        if (data.series) {
            for (const [name, sData] of Object.entries(data.series)) {
                series.push({ name: name, ...sData });
            }
        }
        series.reverse(); // Reverse for latest first

        let html = '';
        
        for (let i = 0; i < series.length; i++) {
            const s = series[i];
            // Calculate Seasons: S1 S2 S3
            let seasonBadges = Object.keys(s.seasons || {}).sort((a,b)=>a-b).map(num => 'S'+num).join(' ');

            html += `<div class="movie-card rounded-lg overflow-hidden item relative" data-title="${s.name.toLowerCase()}">
                <span class="absolute top-2 left-2 bg-purple-600/90 text-white px-2 py-1 text-[9px] font-bold rounded tracking-wider z-10">SERIES</span>
                <img src="${s.logo || fallback}" class="w-full aspect-[2/3] object-cover">
                <div class="p-3">
                    <h3 class="text-xs font-bold truncate mb-1">${s.name}</h3>
                    <div class="text-[10px] text-purple-400 font-bold mb-2 tracking-widest break-words">${seasonBadges}</div>
                    <button onclick="openSeries('${s.name.replace(/'/g, "\\'")}')" class="w-full bg-[#222] hover:bg-blue-600 py-1.5 rounded text-[10px] font-bold transition">VIEW EPISODES</button>
                </div>
            </div>`;
        }
        document.getElementById('grid').innerHTML = html;
    });

    function playMedia(u, t) {
        const isM = /Android|iPhone|iPad/i.test(navigator.userAgent);
        if(isM) window.location.href = `intent:${u}#Intent;type=video/*;end`;
        else {
            const b = new Blob(["#EXTM3U\n#EXTINF:-1," + t + "\n" + u], {type: "audio/mpegurl"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b); a.download = t + ".m3u"; a.click();
        }
    }

    function openSeries(name) {
        const d = globalSeriesData[name];
        document.getElementById('mTitle').innerText = name;
        let h = '';
        Object.keys(d.seasons).sort((a,b)=>b-a).forEach(s => {
            h += `<div class="text-[10px] font-bold text-blue-500 mt-3 mb-1 uppercase">Season ${s}</div>`;
            d.seasons[s].forEach(e => {
                h += `<div class="flex items-center justify-between bg-[#111] p-2 rounded border border-[#222]">
                    <span class="text-[10px] truncate w-3/5">E${e.episode}: ${e.title || 'Episode '+e.episode}</span>
                    <div class="flex gap-1">
                        <button onclick="playMedia('${e.url}', '${e.title ? e.title.replace(/'/g, "\\'") : name}')" class="bg-blue-600 px-2 py-1 rounded text-[9px] font-bold">▶ PLAY</button>
                        <a href="${e.url.replace('/api/file/', '/u/')}" target="_blank" class="bg-[#222] px-2 py-1 rounded text-[9px] font-bold text-center">⬇️ Download</a>
                    </div>
                </div>`;
            });
        });
        document.getElementById('mBody').innerHTML = h;
        document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    
    function search() {
        let v = document.getElementById('q').value.toLowerCase();
        document.querySelectorAll('.item').forEach(i => {
            i.style.display = i.getAttribute('data-title').includes(v) ? 'block' : 'none';
        });
    }
    </script>
</body>
</html>
